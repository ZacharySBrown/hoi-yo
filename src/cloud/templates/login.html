<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOI-YO -- War Room Access</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary:    #0a0a14;
      --bg-secondary:  #0e0e1b;
      --bg-card:       #12121f;
      --bg-card-hover: #181830;
      --text-primary:  #e8e8f0;
      --text-secondary:#8b8fa8;
      --text-muted:    #4a4e65;
      --border:        #1e1e35;
      --border-hover:  #2e2e50;
      --accent:        #e94560;
      --accent-dim:    #e9456033;
      --radius-md:     10px;
      --radius-lg:     14px;
      --font-sans:     'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono:     'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Subtle animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(233, 69, 96, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(233, 69, 96, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: grid-drift 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes grid-drift {
      to { background-position: 60px 60px; }
    }

    .login-card {
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .logo {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 6px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 28px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      position: relative;
    }

    .input-group input {
      width: 100%;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-size: 14px;
      font-family: var(--font-mono);
      letter-spacing: 2px;
      text-align: center;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .input-group input::placeholder {
      color: var(--text-muted);
      letter-spacing: 1px;
      font-family: var(--font-sans);
    }

    .submit-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 14px 24px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .submit-btn:hover {
      background: #d63a52;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .error {
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      margin-top: 4px;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .footer-note {
      margin-top: 28px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">HOI-YO</div>
    <div class="subtitle">AI War Room</div>
    <div class="divider"></div>

    <form method="POST" action="/auth">
      <div class="input-group">
        <input
          type="password"
          name="password"
          placeholder="Enter access code"
          autocomplete="current-password"
          autofocus
          required
        >
      </div>
      <!-- ERROR_PLACEHOLDER -->
      <button type="submit" class="submit-btn">Enter the War Room</button>
    </form>

    <p class="footer-note">Authorized personnel only</p>
  </div>
</body>
</html>
