<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOI-YO Observer Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Top Bar (sticky) -->
<header class="topbar">
    <div class="topbar-logo">HOI-YO<span class="topbar-sub">observer</span></div>
    <div class="topbar-center">
        <div class="topbar-info">
            <span class="info-label">TURN</span>
            <span class="info-value" id="turn-number">--</span>
        </div>
        <div class="topbar-divider"></div>
        <div class="topbar-info">
            <span class="info-label">DATE</span>
            <span class="info-value" id="game-date">----.--.--</span>
        </div>
        <div class="topbar-divider"></div>
        <div class="topbar-info">
            <span class="info-label">TENSION</span>
            <span class="info-value" id="world-tension">--%</span>
        </div>
        <div class="topbar-divider"></div>
        <div class="topbar-info">
            <span class="info-label">API COST</span>
            <span class="info-value cost-value" id="api-cost">$0.00</span>
        </div>
    </div>
    <div class="topbar-right">
        <div class="speed-controls">
            <span class="speed-label">SPEED</span>
            <button class="speed-btn pause-btn" data-speed="0" title="Pause">&#10074;&#10074;</button>
            <button class="speed-btn" data-speed="1">1</button>
            <button class="speed-btn" data-speed="2">2</button>
            <button class="speed-btn active" data-speed="3">3</button>
            <button class="speed-btn" data-speed="4">4</button>
            <button class="speed-btn" data-speed="5">5</button>
        </div>
        <div class="connection-badge">
            <div class="conn-dot" id="ws-dot"></div>
            <span id="ws-status">Connecting</span>
        </div>
    </div>
</header>

<!-- World Tension Bar -->
<div class="tension-bar">
    <div class="tension-fill" id="tension-fill" style="width: 0%"></div>
</div>

<!-- Diplomatic Web / Gameboard -->
<section class="diplo-section">
    <div class="diplo-header">
        <h2 class="section-title">Diplomatic Web</h2>
        <div class="diplo-legend">
            <span class="legend-item"><span class="legend-line legend-befriend"></span>Befriend</span>
            <span class="legend-item"><span class="legend-line legend-antagonize"></span>Antagonize</span>
            <span class="legend-item"><span class="legend-line legend-alliance"></span>Alliance</span>
            <span class="legend-item"><span class="legend-line legend-protect"></span>Protect</span>
        </div>
    </div>
    <div class="diplo-canvas">
        <svg id="diplo-svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
            <defs>
                <filter id="glow-green"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <filter id="glow-red"><feGaussianBlur stdDeviation="2.5" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <filter id="glow-node"><feGaussianBlur stdDeviation="6" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <filter id="war-pulse"><feGaussianBlur stdDeviation="8" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <!-- Connection lines drawn by JS -->
            <g id="diplo-lines"></g>
            <!-- War clouds drawn by JS -->
            <g id="diplo-wars"></g>
            <!-- Faction brackets drawn by JS -->
            <g id="diplo-factions"></g>
            <!-- Nation nodes drawn by JS -->
            <g id="diplo-nodes"></g>
        </svg>
    </div>
</section>

<!-- Nation Cards Grid -->
<section class="cards-section">
    <h2 class="section-title">Nation Intelligence</h2>
    <div class="nation-grid" id="nation-grid"></div>
</section>

<!-- Event Timeline -->
<section class="timeline-section">
    <div class="timeline-header">
        <h2 class="section-title">Event Timeline</h2>
        <button class="timeline-toggle" id="timeline-toggle">Collapse</button>
    </div>
    <div class="timeline-events" id="timeline-events">
        <div class="timeline-empty">Waiting for first turn...</div>
    </div>
</section>

<!-- Whisper Bar (fixed bottom) -->
<div class="whisper-bar">
    <div class="whisper-icon">&#9993;</div>
    <select id="whisper-target">
        <option value="GER">Germany</option>
        <option value="SOV">Soviet Union</option>
        <option value="USA">United States</option>
        <option value="ENG">United Kingdom</option>
        <option value="JAP">Japan</option>
        <option value="ITA">Italy</option>
    </select>
    <input type="text" id="whisper-input" placeholder="Send a whisper to the agent..." autocomplete="off">
    <button class="whisper-btn" id="whisper-send">Send</button>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<!-- Connecting Overlay -->
<div class="connecting-overlay visible" id="connecting-overlay">
    <div class="connecting-spinner"></div>
    <div class="connecting-text">Connecting to HOI-YO...</div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
