name: Build macOS App

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller>=6.0

      - name: Build with PyInstaller
        run: |
          pyinstaller --name "HOI-YO" --onedir \
            --add-data "personas:personas" \
            --add-data "src/dashboard/static:src/dashboard/static" \
            --add-data "src/writer/templates:src/writer/templates" \
            --add-data "src/cloud/templates:src/cloud/templates" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.http.h11_impl \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.protocols.websockets.websockets_impl \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.lifespan.off \
            --hidden-import src \
            --hidden-import src.cli \
            --hidden-import src.config \
            --hidden-import src.orchestrator \
            --hidden-import src.dashboard.server \
            --hidden-import src.personas.loader \
            --hidden-import src.game.controller \
            --hidden-import src.game.input_backends \
            --hidden-import src.game.save_watcher \
            --hidden-import src.game.settings \
            --hidden-import src.agents.runner \
            --hidden-import src.agents.model_router \
            --hidden-import src.agents.schema \
            --hidden-import src.board_state.builder \
            --hidden-import src.board_state.prompts \
            --hidden-import src.parser.fast_parser \
            --hidden-import src.parser.save_parser \
            --hidden-import src.parser.clausewitz \
            --hidden-import src.writer.strategy_writer \
            --hidden-import src.interfaces \
            src/cli.py

      - name: Copy config into dist
        run: |
          cp config.toml dist/HOI-YO/config.toml

      - name: Create .env placeholder
        run: |
          echo "# Paste your Anthropic API key below:" > dist/HOI-YO/.env
          echo "ANTHROPIC_API_KEY=" >> dist/HOI-YO/.env

      - name: Create launcher script
        run: |
          cat > dist/HOI-YO/hoi-yo.sh << 'LAUNCHER'
          #!/usr/bin/env bash
          # hoi-yo macOS launcher
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$SCRIPT_DIR"
          ./HOI-YO "$@"
          LAUNCHER
          chmod +x dist/HOI-YO/hoi-yo.sh
          chmod +x dist/HOI-YO/HOI-YO

      - name: Ad-hoc codesign
        run: |
          codesign --force --deep --sign - dist/HOI-YO/HOI-YO

      - name: Zip the build
        run: |
          cd dist && zip -r ../HOI-YO-macOS.zip HOI-YO/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HOI-YO-macOS
          path: HOI-YO-macOS.zip
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: HOI-YO-macOS.zip
          generate_release_notes: true
